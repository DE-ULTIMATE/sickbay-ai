<!DOCTYPE html>
<html>

<head>

<title>Sickbay AI User Management</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>


<body>


{% include 'navigation.html' %}



<div class="portal-header">

    <h1>👥 User Management</h1>

    <p>
        Manage Sickbay AI accounts
    </p>

</div>

<a href="/change_password" style="background: #ffc107; color: #000; padding: 10px 15px; border-radius: 5px; text-decoration: none; font-weight: bold;">🔑 Change Password</a>




<div class="card">


<h2>
System Users
</h2>



<table>


<tr>

<th>
ID
</th>

<th>
Username
</th>

<th>
Role
</th>

<th>
Action
</th>

</tr>




{% for user in users %}


<tr>


<td>
{{ user["id"] }}
</td>



<td>
{{ user["username"] }}
</td>



<td>
{{ user["role"] }}
</td>




<td>

<a href="/delete_user/{{ user['id'] }}">

<button>
🗑 Delete
</button>

</a>

</td>



</tr>



{% endfor %}



</table>





<br>



<a href="/add_user">

<button>
➕ Add New User
</button>

</a>




<br><br>




<a href="/admin">

<button>
⬅ Back to Admin Panel
</button>

</a>




</div>





<div class="footer">

DEULTIMATE HQ © 2026

<br>

Sickbay AI Health Portal v3.1

</div>




</body>

</html>
